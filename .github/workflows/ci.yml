name: ci

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Compile Python scripts
        run: python -m compileall scripts
      - name: Audit public release
        run: python scripts/audit_public_release.py .

